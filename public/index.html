```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Eco Arandor Online</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0f14;
overflow:hidden;
color:white;
}

#gameContainer{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

canvas{
display:block;
background:#2d7f36;
image-rendering:pixelated;
}

#hud{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,.6);
padding:15px;
border-radius:12px;
border:1px solid #444;
backdrop-filter:blur(4px);
}

#hud h1{
font-size:18px;
margin-bottom:5px;
color:#7ee787;
}

#chat{
position:absolute;
left:20px;
bottom:20px;
width:320px;
background:rgba(0,0,0,.65);
border-radius:12px;
padding:10px;
border:1px solid #444;
}

#messages{
height:120px;
overflow-y:auto;
font-size:13px;
margin-bottom:8px;
}

#messages div{
margin-bottom:5px;
}

#chatInput{
width:100%;
padding:8px;
border:none;
outline:none;
background:#111;
color:white;
border-radius:8px;
}

#online{
color:#7ee787;
}

</style>
</head>

<body>

<div id="gameContainer">

<canvas id="game"></canvas>

<div id="hud">
<h1>Eco Arandor Online</h1>
<div>Jogadores: <span id="online">0</span></div>
<div>WASD para mover</div>
<div>Enter para chat</div>
</div>

<div id="chat">
<div id="messages"></div>
<input id="chatInput" placeholder="Digite algo..." />
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

let players = {};

const me = {
x:400,
y:300,
speed:4
};

const keys = {};

document.addEventListener("keydown",e=>{

if(document.activeElement.id === "chatInput") return;

keys[e.key.toLowerCase()] = true;

});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});

function move(){

let moving = false;

if(keys["w"]){
me.y -= me.speed;
moving = true;
}

if(keys["s"]){
me.y += me.speed;
moving = true;
}

if(keys["a"]){
me.x -= me.speed;
moving = true;
}

if(keys["d"]){
me.x += me.speed;
moving = true;
}

if(moving){

socket.emit("move",{
x:me.x,
y:me.y
});

}

}

socket.on("players",serverPlayers=>{

players = serverPlayers;

if(players[socket.id]){

me.x += (players[socket.id].x - me.x) * 0.35;
me.y += (players[socket.id].y - me.y) * 0.35;

}

document.getElementById("online").innerText =
Object.keys(players).length;

});

socket.on("chat",msg=>{

const div = document.createElement("div");
div.textContent = msg;

const messages = document.getElementById("messages");

messages.appendChild(div);

messages.scrollTop = messages.scrollHeight;

});

document.getElementById("chatInput")
.addEventListener("keydown",e=>{

if(e.key === "Enter"){

const value = e.target.value.trim();

if(value !== ""){

socket.emit("chat",value);

e.target.value = "";

}

}

});

const trees = [];
const rocks = [];
const flowers = [];
const lakes = [];

for(let i=0;i<80;i++){

trees.push({
x:Math.random()*4000-2000,
y:Math.random()*4000-2000
});

}

for(let i=0;i<50;i++){

rocks.push({
x:Math.random()*4000-2000,
y:Math.random()*4000-2000
});

}

for(let i=0;i<250;i++){

flowers.push({
x:Math.random()*4000-2000,
y:Math.random()*4000-2000,
c:Math.random()>.5?"#fff":"#ffd54f"
});

}

for(let i=0;i<4;i++){

lakes.push({
x:Math.random()*3000-1500,
y:Math.random()*3000-1500,
w:300,
h:220
});

}

function worldToScreen(x,y){

return{
x:x-me.x+canvas.width/2,
y:y-me.y+canvas.height/2
};

}

function drawGround(){

ctx.fillStyle = "#2d7f36";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let x=-100;x<canvas.width+100;x+=64){

for(let y=-100;y<canvas.height+100;y+=64){

ctx.fillStyle =
(x+y)%128===0?"#317f39":"#2b7332";

ctx.fillRect(x,y,64,64);

}

}

}

function drawLakes(){

lakes.forEach(l=>{

const p = worldToScreen(l.x,l.y);

ctx.fillStyle = "#1d5ea8";

ctx.beginPath();

ctx.roundRect(p.x,p.y,l.w,l.h,40);

ctx.fill();

ctx.fillStyle = "rgba(255,255,255,.12)";

ctx.fillRect(p.x+20,p.y+20,l.w-40,20);

});

}

function drawTrees(){

trees.forEach(t=>{

const p = worldToScreen(t.x,t.y);

ctx.fillStyle = "rgba(0,0,0,.25)";
ctx.beginPath();
ctx.ellipse(p.x,p.y+25,30,12,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = "#5a3418";
ctx.fillRect(p.x-6,p.y,12,35);

ctx.fillStyle = "#145c24";
ctx.beginPath();
ctx.arc(p.x,p.y-10,35,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = "#1c7a31";
ctx.beginPath();
ctx.arc(p.x-12,p.y-18,20,0,Math.PI*2);
ctx.fill();

});

}

function drawFlowers(){

flowers.forEach(f=>{

const p = worldToScreen(f.x,f.y);

ctx.fillStyle = f.c;
ctx.fillRect(p.x,p.y,4,4);

});

}

function drawRocks(){

rocks.forEach(r=>{

const p = worldToScreen(r.x,r.y);

ctx.fillStyle = "#777";

ctx.beginPath();
ctx.ellipse(p.x,p.y,14,10,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = "#999";

ctx.beginPath();
ctx.ellipse(p.x-4,p.y-3,5,3,0,0,Math.PI*2);
ctx.fill();

});

}

function drawPlayer(p,isMe){

const pos = worldToScreen(p.x,p.y);

ctx.fillStyle = "rgba(0,0,0,.25)";
ctx.beginPath();
ctx.ellipse(pos.x,pos.y+28,18,8,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = isMe ? "#2ea8ff" : p.color || "#ffd54f";

ctx.fillRect(pos.x-14,pos.y-18,28,34);

ctx.fillStyle = "#f5c16c";
ctx.fillRect(pos.x-11,pos.y-38,22,20);

ctx.fillStyle = "#222";
ctx.fillRect(pos.x-6,pos.y-30,3,3);
ctx.fillRect(pos.x+3,pos.y-30,3,3);

ctx.fillStyle = "#0d47a1";
ctx.fillRect(pos.x-14,pos.y+15,10,18);
ctx.fillRect(pos.x+4,pos.y+15,10,18);

ctx.fillStyle = "#fff";
ctx.font = "13px Arial";
ctx.textAlign = "center";

ctx.fillText(
p.name || "Player",
pos.x,
pos.y-48
);

ctx.textAlign = "left";

}

function draw(){

drawGround();
drawLakes();
drawFlowers();
drawRocks();
drawTrees();

for(let id in players){

drawPlayer(
players[id],
id === socket.id
);

}

}

function loop(){

move();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
